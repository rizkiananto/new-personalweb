services:
  web-prod:
    image: ghcr.io/rizkiananto/new-personalweb:master  # Replace with your actual repo
    ports:
      - "127.0.0.1:3003:3000"  # Bind to localhost:3003 (matching your nginx config)
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL}
      - NEXT_PUBLIC_API_KEY=${NEXT_PUBLIC_API_KEY}
      - PORT=3000
      - HOSTNAME=0.0.0.0
    restart: unless-stopped
    container_name: personalweb-prod

networks:
  default:
    name: personalweb-network