name: Build and Deploy to VPS

on:
  push:
    branches: [ main, master ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Convert repository name to lowercase
      id: repo_name
      run: echo "repo_lower=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

    - name: Extract metadata for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ steps.repo_name.outputs.repo_lower }}
        tags: |
          type=ref,event=branch
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        target: runner
        build-args: |
          NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
          NEXT_PUBLIC_API_KEY=${{ secrets.NEXT_PUBLIC_API_KEY }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    
    steps:
    - name: Convert repository name to lowercase
      id: repo_name
      run: echo "repo_lower=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

    - name: Deploy to VPS
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        port: ${{ secrets.VPS_PORT }}
        script: |
          # Navigate to deployment directory
          cd /opt/personalweb
          
          # Check if .env exists
          if [ ! -f .env ]; then
            echo "ERROR: .env file not found!"
            exit 1
          fi
          
          # Login to GitHub Container Registry
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          
          # Set image name (lowercase)
          IMAGE_NAME="ghcr.io/${{ steps.repo_name.outputs.repo_lower }}:main"
          echo "Pulling image: $IMAGE_NAME"
          
          # Pull latest image
          docker pull $IMAGE_NAME
          
          # Stop and remove old container if exists
          docker stop personalweb-prod 2>/dev/null || true
          docker rm personalweb-prod 2>/dev/null || true
          
          # Start new container
          docker run -d \
            --name personalweb-prod \
            --restart unless-stopped \
            -p 127.0.0.1:3003:3000 \
            --env-file .env \
            $IMAGE_NAME
          
          # Wait a moment for container to start
          sleep 3
          
          # Clean up old images (keep last 3)
          docker image prune -af --filter "until=72h"
          
          # Show container status
          echo "=== Container Status ==="
          docker ps -f name=personalweb-prod
          
          # Show logs (last 30 lines)
          echo "=== Container Logs ==="
          docker logs --tail 30 personalweb-prod
          
          # Test if container is responding
          echo "=== Testing container ==="
          curl -f http://localhost:3003 || echo "Container not responding yet, check logs above"